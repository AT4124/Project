<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyJet Travel</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Film Effects -->
<div class="film-grain"></div>
<div class="dust"></div>

<header>
    <div class="logo">SkyJet Travel</div>

    <nav>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>
<!-- ===== SEARCH SECTION ===== -->
<section class="search-section">
    <input type="text" id="searchBox" placeholder="Search destinations...">
    <button onclick="searchDestinations()">Search</button>
    <button onclick="clearSearch()">Clear</button>
</section>

<!-- ===== SEARCH RESULTS ===== -->
<div id="searchResults" class="content-box"></div>
<!-- HERO SECTION -->
<section class="hero parallax">
    <h1 class="reveal">SkyJet Travel & Tours</h1>
    <p class="reveal-delay">
        Crafting Your Dream Getaway Together !
    </p>
</section>
<!-- MAIN CONTENT -->
<section class="cards">

    <!-- BEACH -->
    <div class="card reveal">
        <h2>Turquoise Escape</h2>
        <button onclick="toggleBeach()">Discover</button>

        <div id="beach" class="hidden content-box">
            <h3>Pereybere, Mauritius</h3>
            <p>
              Crystal-clear waters and soft white sand await
            </p>
            <img src="images/TravelBloom/pereybere.jpg" alt="Pereybere Beach">
            
        </div>
    </div>

    <!-- TEMPLE -->
    <div class="card reveal">
        <h2>Sacred Echo</h2>
        <button onclick="toggleTemple()">Discover</button>

        <div id="temple" class="hidden content-box">
            <h3>Grand Bassin</h3>
            <p>
                Still waters reflecting devotion and time.
            </p>
            <img src='images/TravelBloom/gg.jpg' alt="Grand Bassin Temple">
        </div>
    </div>

    <!-- COUNTRY -->
   <div class="card reveal">
    <h2>Distant Horizons</h2>

    <select id="countrySelect">
        <option value="">Select Destination</option>
        <option value="japan">Japan</option>
        <option value="Mauritius">Mauritius</option>
    </select>

    <div id="countryResult" class="content-box"></div>
</div>

</section>

<!-- BACK TO TOP -->
<button id="topBtn" onclick="scrollToTop()">↑</button>

<!-- Optional Ambient Music -->
<audio id="bgMusic" loop>
    <source src="backgroundsound.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
